<section class="grid match-detail-grid" data-view="match-detail">
  {% if panels %}
    {% for panel in panels %}
      <article class="panel">
        <div class="head"><h3>{{ panel.title }}</h3></div>
        <div class="body">
          {% if panel.kind == 'html' %}
            {{ panel.html | safe }}
          {% else %}
            <p>{{ panel.text }}</p>
          {% endif %}
        </div>
      </article>
    {% endfor %}
  {% else %}
    <article class="empty">Informacion no disponible</article>
  {% endif %}
</section>
