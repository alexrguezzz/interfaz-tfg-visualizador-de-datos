<script>
  (function () {
    var widgetCounter = 0;
    var TEAM_COLORS = [
      'rgba(74, 144, 226, 0.94)',
      'rgba(255, 115, 77, 0.94)',
      'rgba(247, 193, 72, 0.94)',
      'rgba(142, 117, 255, 0.94)'
    ];

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function toNumber(value) {
      var parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : null;
    }

    function createSvgNode(name, attrs) {
      var NS = 'http://www.w3.org/2000/svg';
      var node = document.createElementNS(NS, name);

      Object.keys(attrs || {}).forEach(function (key) {
        if (attrs[key] !== null && attrs[key] !== undefined) {
          node.setAttribute(key, String(attrs[key]));
        }
      });

      return node;
    }

    function appendTitle(node, text) {
      if (!text) {
        return;
      }

      var title = createSvgNode('title');
      title.textContent = text;
      node.appendChild(title);
    }

    function createArrowMarker(id, color) {
      var marker = createSvgNode('marker', {
        id: id,
        markerWidth: 12,
        markerHeight: 12,
        refX: 10,
        refY: 6,
        orient: 'auto',
        markerUnits: 'userSpaceOnUse'
      });

      marker.appendChild(createSvgNode('path', {
        d: 'M 0 0 L 10 6 L 0 12 z',
        fill: color
      }));

      return marker;
    }

    function isFailedOutcome(item) {
      var outcome = String(item.outcome_type || '').toLowerCase();
      return outcome.indexOf('unsuccess') !== -1
        || outcome.indexOf('fail') !== -1
        || outcome.indexOf('incomplete') !== -1
        || outcome.indexOf('inaccurate') !== -1
        || outcome.indexOf('error') !== -1;
    }

    function getPassStyle(item, markerIds) {
      if (isFailedOutcome(item)) {
        return {
          color: 'rgba(229, 83, 83, 0.92)',
          marker: 'url(#' + markerIds.failed + ')'
        };
      }

      return {
        color: 'rgba(78, 200, 112, 0.92)',
        marker: 'url(#' + markerIds.success + ')'
      };
    }

    function buildTeamColors(events) {
      var colors = {};
      Array.from(new Set(events.map(function (item) {
        return item.team || '';
      }).filter(Boolean))).sort().forEach(function (team, index) {
        colors[team] = TEAM_COLORS[index % TEAM_COLORS.length];
      });
      return colors;
    }

    function getTeamColor(team, teamColors) {
      return teamColors[team || ''] || 'rgba(255, 255, 255, 0.88)';
    }

    function renderLegend(container, teamColors) {
      if (!container) {
        return;
      }

      container.innerHTML = '';
      Object.keys(teamColors).forEach(function (team) {
        var item = document.createElement('span');
        item.className = 'shot-legend-item';

        var swatch = document.createElement('span');
        swatch.className = 'shot-legend-swatch';
        swatch.style.background = teamColors[team];

        var label = document.createElement('span');
        label.textContent = team;

        item.appendChild(swatch);
        item.appendChild(label);
        container.appendChild(item);
      });
    }

    function populateTeamOptions(select, events) {
      Array.from(new Set(events.map(function (item) {
        return item.team || '';
      }).filter(Boolean))).sort().forEach(function (team) {
        var option = document.createElement('option');
        option.value = team;
        option.textContent = team;
        select.appendChild(option);
      });
    }

    function rebuildPlayerOptions(select, events, selectedTeam) {
      var current = select.value;
      select.innerHTML = '<option value="all">Todos</option>';

      Array.from(new Set(events.filter(function (item) {
        return selectedTeam === 'all' || !selectedTeam || (item.team || '') === selectedTeam;
      }).map(function (item) {
        return item.player || '';
      }).filter(Boolean))).sort().forEach(function (player) {
        var option = document.createElement('option');
        option.value = player;
        option.textContent = player;
        select.appendChild(option);
      });

      if (current && Array.from(select.options).some(function (option) {
        return option.value === current;
      })) {
        select.value = current;
      }
    }

    function drawPitchFrame(svg, markerIds) {
      svg.innerHTML = '';

      var width = 1000;
      var height = 620;
      var margin = 24;
      var pitchW = width - (margin * 2);
      var pitchH = height - (margin * 2);

      var defs = createSvgNode('defs');
      defs.appendChild(createArrowMarker(markerIds.success, 'rgba(78, 200, 112, 0.92)'));
      defs.appendChild(createArrowMarker(markerIds.failed, 'rgba(229, 83, 83, 0.92)'));
      svg.appendChild(defs);

      svg.appendChild(createSvgNode('rect', {
        x: margin,
        y: margin,
        width: pitchW,
        height: pitchH,
        fill: 'rgba(20, 120, 58, 0.24)',
        stroke: '#e9f7ed',
        'stroke-width': 3
      }));

      svg.appendChild(createSvgNode('line', {
        x1: width / 2,
        y1: margin,
        x2: width / 2,
        y2: height - margin,
        stroke: '#e9f7ed',
        'stroke-width': 3
      }));

      svg.appendChild(createSvgNode('circle', {
        cx: width / 2,
        cy: height / 2,
        r: 74,
        fill: 'none',
        stroke: '#e9f7ed',
        'stroke-width': 3
      }));

      svg.appendChild(createSvgNode('circle', {
        cx: width / 2,
        cy: height / 2,
        r: 4,
        fill: '#e9f7ed'
      }));

      function addBox(x, y, boxWidth, boxHeight) {
        svg.appendChild(createSvgNode('rect', {
          x: x,
          y: y,
          width: boxWidth,
          height: boxHeight,
          fill: 'none',
          stroke: '#e9f7ed',
          'stroke-width': 3
        }));
      }

      addBox(margin, margin + 118, 160, 360);
      addBox(margin, margin + 188, 66, 220);
      addBox(width - margin - 160, margin + 118, 160, 360);
      addBox(width - margin - 66, margin + 188, 66, 220);

      svg.appendChild(createSvgNode('circle', {
        cx: margin + 112,
        cy: height / 2,
        r: 4,
        fill: '#e9f7ed'
      }));

      svg.appendChild(createSvgNode('circle', {
        cx: width - margin - 112,
        cy: height / 2,
        r: 4,
        fill: '#e9f7ed'
      }));

      var layer = createSvgNode('g', { 'data-event-layer': 1 });
      svg.appendChild(layer);
    }

    function drawShotPitchFrame(svg) {
      svg.innerHTML = '';

      var width = 520;
      var height = 620;
      var margin = 24;
      var pitchW = width - (margin * 2);
      var pitchH = height - (margin * 2);
      var centerX = width / 2;
      var goalW = 146;
      var goalDepth = 18;
      var goalX = centerX - (goalW / 2);
      var goalY = margin - 4;
      var penaltyW = 268;
      var penaltyH = 184;
      var sixW = 122;
      var sixH = 68;

      svg.appendChild(createSvgNode('rect', {
        x: margin,
        y: margin,
        width: pitchW,
        height: pitchH,
        fill: 'rgba(20, 120, 58, 0.22)',
        stroke: '#e9f7ed',
        'stroke-width': 3
      }));

      svg.appendChild(createSvgNode('line', {
        x1: margin,
        y1: height - margin,
        x2: width - margin,
        y2: height - margin,
        stroke: '#e9f7ed',
        'stroke-width': 3
      }));

      svg.appendChild(createSvgNode('rect', {
        x: centerX - (penaltyW / 2),
        y: margin,
        width: penaltyW,
        height: penaltyH,
        fill: 'none',
        stroke: '#e9f7ed',
        'stroke-width': 3
      }));

      svg.appendChild(createSvgNode('rect', {
        x: centerX - (sixW / 2),
        y: margin,
        width: sixW,
        height: sixH,
        fill: 'none',
        stroke: '#e9f7ed',
        'stroke-width': 3
      }));

      svg.appendChild(createSvgNode('circle', {
        cx: centerX,
        cy: margin + 118,
        r: 4,
        fill: '#e9f7ed'
      }));

      svg.appendChild(createSvgNode('rect', {
        x: goalX,
        y: goalY,
        width: goalW,
        height: goalDepth,
        fill: 'rgba(244, 250, 245, 0.12)',
        stroke: '#f7fffa',
        'stroke-width': 3
      }));

      var shotLayer = createSvgNode('g', { 'data-shot-layer': 1 });
      svg.appendChild(shotLayer);

      return {
        margin: margin,
        pitchW: pitchW,
        pitchH: pitchH,
        centerX: centerX,
        goalX: goalX,
        goalY: goalY,
        goalW: goalW,
        goalDepth: goalDepth
      };
    }

    function drawGoalFrame(svg, selectedShot, color) {
      svg.innerHTML = '';

      var width = 320;
      var height = 380;
      var goalX = 48;
      var goalY = 76;
      var goalW = 224;
      var goalH = 118;

      svg.appendChild(createSvgNode('rect', {
        x: 0,
        y: 0,
        width: width,
        height: height,
        fill: 'rgba(244, 248, 252, 1)'
      }));

      svg.appendChild(createSvgNode('rect', {
        x: 0,
        y: goalY + goalH + 24,
        width: width,
        height: height - (goalY + goalH + 24),
        fill: 'rgba(57, 128, 86, 0.18)'
      }));

      svg.appendChild(createSvgNode('rect', {
        x: goalX + 8,
        y: goalY + 8,
        width: goalW,
        height: goalH,
        fill: 'rgba(31, 45, 61, 0.08)'
      }));

      var net = createSvgNode('g', {
        stroke: 'rgba(142, 157, 174, 0.55)',
        'stroke-width': 1
      });

      for (var x = goalX; x <= goalX + goalW; x += 22) {
        net.appendChild(createSvgNode('line', {
          x1: x,
          y1: goalY,
          x2: x,
          y2: goalY + goalH
        }));
      }

      for (var y = goalY; y <= goalY + goalH; y += 22) {
        net.appendChild(createSvgNode('line', {
          x1: goalX,
          y1: y,
          x2: goalX + goalW,
          y2: y
        }));
      }

      svg.appendChild(net);

      svg.appendChild(createSvgNode('rect', {
        x: goalX,
        y: goalY,
        width: goalW,
        height: goalH,
        fill: 'none',
        stroke: '#243446',
        'stroke-width': 5
      }));

      svg.appendChild(createSvgNode('line', {
        x1: goalX,
        y1: goalY + goalH,
        x2: goalX + goalW,
        y2: goalY + goalH,
        stroke: 'rgba(36, 52, 70, 0.22)',
        'stroke-width': 2.5
      }));

      svg.appendChild(createSvgNode('text', {
        x: width / 2,
        y: 32,
        'text-anchor': 'middle',
        'font-size': 15,
        'font-weight': 800,
        fill: '#243446'
      })).textContent = 'Destino del disparo';

      if (!selectedShot) {
        svg.appendChild(createSvgNode('text', {
          x: width / 2,
          y: goalY + goalH + 62,
          'text-anchor': 'middle',
          'font-size': 13,
          'font-weight': 700,
          fill: '#607181'
        })).textContent = 'Selecciona un disparo';
        return;
      }

      var targetY = toNumber(selectedShot.goal_mouth_y);
      var targetZ = toNumber(selectedShot.goal_mouth_z);

      if (targetY === null || targetZ === null) {
        svg.appendChild(createSvgNode('text', {
          x: width / 2,
          y: goalY + goalH + 62,
          'text-anchor': 'middle',
          'font-size': 13,
          'font-weight': 700,
          fill: '#607181'
        })).textContent = 'Sin coordenadas de porteria';
        return;
      }

      var shotColor = color || 'rgba(74, 144, 226, 0.94)';
      var dotX = goalX + ((clamp(targetY, 0, 100) / 100) * goalW);
      var dotY = goalY + (((100 - clamp(targetZ, 0, 100)) / 100) * goalH);

      svg.appendChild(createSvgNode('line', {
        x1: dotX,
        y1: dotY,
        x2: dotX,
        y2: goalY + goalH + 30,
        stroke: shotColor,
        'stroke-width': 2,
        'stroke-dasharray': '6 5',
        opacity: 0.6
      }));

      svg.appendChild(createSvgNode('circle', {
        cx: dotX,
        cy: dotY,
        r: 15,
        fill: shotColor,
        opacity: 0.16
      }));

      svg.appendChild(createSvgNode('circle', {
        cx: dotX,
        cy: dotY,
        r: 6.5,
        fill: shotColor,
        stroke: 'rgba(255, 255, 255, 0.96)',
        'stroke-width': 2
      }));

      if (selectedShot.is_goal === true) {
        svg.appendChild(createSvgNode('circle', {
          cx: dotX,
          cy: dotY,
          r: 10.5,
          fill: 'none',
          stroke: shotColor,
          'stroke-width': 2,
          opacity: 0.9
        }));
      }
    }

    function toPitchX(value) {
      return 24 + ((Number(value) / 100) * (1000 - 48));
    }

    function toPitchY(value) {
      return 24 + ((Number(value) / 100) * (620 - 48));
    }

    function getShotKey(item) {
      if (item.event_id) {
        return String(item.event_id);
      }

      return [
        item.team || '',
        item.player || '',
        item.minute || '',
        item.x || '',
        item.y || '',
        item.goal_mouth_y || '',
        item.goal_mouth_z || ''
      ].join('|');
    }

    function normalizeShotCoords(item) {
      var x = toNumber(item.x);
      var y = toNumber(item.y);

      if (x === null || y === null) {
        return null;
      }

      if (x < 50) {
        x = 100 - x;
        y = 100 - y;
      }

      return {
        x: clamp(x, 50, 100),
        y: clamp(y, 0, 100)
      };
    }

    function toShotPitchPoint(item, frame) {
      var normalized = normalizeShotCoords(item);
      if (!normalized) {
        return null;
      }

      return {
        x: frame.margin + ((normalized.y / 100) * frame.pitchW),
        y: frame.margin + (((100 - normalized.x) / 50) * frame.pitchH)
      };
    }

    function getShotGoalAnchor(item, frame) {
      var mouthY = toNumber(item.goal_mouth_y);
      return {
        x: mouthY === null
          ? frame.centerX
          : frame.goalX + ((clamp(mouthY, 0, 100) / 100) * frame.goalW),
        y: frame.goalY + (frame.goalDepth / 2)
      };
    }

    function buildShotDescription(item) {
      var parts = [];
      var outcome = String(item.outcome_type || '').trim();

      parts.push(item.player || 'Sin jugador');
      parts.push(item.team || 'Sin equipo');

      if (toNumber(item.minute) !== null) {
        parts.push(String(item.minute) + '\'');
      }

      if (item.is_goal === true) {
        parts.push('Gol');
      } else if (outcome) {
        parts.push(outcome);
      }

      return parts.join(' | ');
    }

    function renderPassWidget(widget) {
      var dataNode = widget.querySelector('[data-pass-data]');
      var svg = widget.querySelector('.pass-pitch-svg');
      var teamSelect = widget.querySelector('[data-pass-team]');
      var playerSelect = widget.querySelector('[data-pass-player]');
      var outcomeSelect = widget.querySelector('[data-pass-outcome]');
      var summary = widget.querySelector('[data-pass-summary]');
      var events;
      var widgetId = String(widgetCounter += 1);
      var markerIds = {
        success: 'pass-arrow-success-' + widgetId,
        failed: 'pass-arrow-failed-' + widgetId
      };

      if (!dataNode || !svg || !teamSelect || !playerSelect || !outcomeSelect || !summary) {
        return;
      }

      try {
        events = JSON.parse(dataNode.textContent || '[]');
      } catch (_error) {
        events = [];
      }

      populateTeamOptions(teamSelect, events);

      function filterPasses() {
        var teamValue = teamSelect.value;
        var playerValue = playerSelect.value;
        var outcomeValue = outcomeSelect.value;

        return events.filter(function (item) {
          if (teamValue !== 'all' && (item.team || '') !== teamValue) {
            return false;
          }
          if (playerValue !== 'all' && (item.player || '') !== playerValue) {
            return false;
          }
          if (outcomeValue === 'completed') {
            return !isFailedOutcome(item);
          }
          if (outcomeValue === 'failed') {
            return isFailedOutcome(item);
          }
          return true;
        });
      }

      function drawPasses(items) {
        var completed = 0;
        var failed = 0;

        drawPitchFrame(svg, markerIds);

        var layer = svg.querySelector('[data-event-layer]');
        if (!layer) {
          return;
        }

        items.forEach(function (item) {
          var startX = toPitchX(item.x);
          var startY = toPitchY(item.y);
          var endX = item.end_x === null || item.end_x === undefined ? null : toPitchX(item.end_x);
          var endY = item.end_y === null || item.end_y === undefined ? null : toPitchY(item.end_y);

          if (endX === null || endY === null) {
            return;
          }

          var passStyle = getPassStyle(item, markerIds);
          if (isFailedOutcome(item)) {
            failed += 1;
          } else {
            completed += 1;
          }

          layer.appendChild(createSvgNode('line', {
            x1: startX,
            y1: startY,
            x2: endX,
            y2: endY,
            stroke: passStyle.color,
            'stroke-width': 2.5,
            'stroke-linecap': 'round',
            'marker-end': passStyle.marker
          }));

          layer.appendChild(createSvgNode('circle', {
            cx: startX,
            cy: startY,
            r: 4,
            fill: passStyle.color,
            stroke: 'rgba(248, 255, 249, 0.95)',
            'stroke-width': 1.2
          }));
        });

        summary.textContent = 'Pases visibles: ' + items.length + ' | Completados: ' + completed + ' | Fallidos: ' + failed;
      }

      function refresh() {
        rebuildPlayerOptions(playerSelect, events, teamSelect.value);
        drawPasses(filterPasses());
      }

      teamSelect.addEventListener('change', refresh);
      playerSelect.addEventListener('change', function () {
        drawPasses(filterPasses());
      });
      outcomeSelect.addEventListener('change', function () {
        drawPasses(filterPasses());
      });

      refresh();
    }

    function renderShotWidget(widget) {
      var dataNode = widget.querySelector('[data-shot-data]');
      var shotSvg = widget.querySelector('.shot-pitch-svg');
      var goalSvg = widget.querySelector('.shot-goal-svg');
      var teamSelect = widget.querySelector('[data-shot-team]');
      var playerSelect = widget.querySelector('[data-shot-player]');
      var resultSelect = widget.querySelector('[data-shot-result]');
      var summary = widget.querySelector('[data-shot-summary]');
      var detail = widget.querySelector('[data-shot-detail]');
      var legend = widget.querySelector('[data-shot-legend]');
      var events;
      var teamColors;
      var selectedShotKey = '';

      if (!dataNode || !shotSvg || !goalSvg || !teamSelect || !playerSelect || !resultSelect || !summary || !detail || !legend) {
        return;
      }

      try {
        events = JSON.parse(dataNode.textContent || '[]');
      } catch (_error) {
        events = [];
      }

      teamColors = buildTeamColors(events);
      renderLegend(legend, teamColors);
      populateTeamOptions(teamSelect, events);

      function filterShots() {
        var teamValue = teamSelect.value;
        var playerValue = playerSelect.value;
        var resultValue = resultSelect.value;

        return events.filter(function (item) {
          if (teamValue !== 'all' && (item.team || '') !== teamValue) {
            return false;
          }
          if (playerValue !== 'all' && (item.player || '') !== playerValue) {
            return false;
          }
          if (resultValue === 'goals') {
            return item.is_goal === true;
          }
          if (resultValue === 'non_goals') {
            return item.is_goal !== true;
          }
          return true;
        });
      }

      function findSelectedShot(shotItems) {
        return shotItems.find(function (item) {
          return getShotKey(item) === selectedShotKey;
        }) || null;
      }

      function updateDetail(item) {
        if (!item) {
          detail.textContent = 'Selecciona un disparo para ver su objetivo en la porteria.';
          return;
        }

        var message = buildShotDescription(item);
        var targetY = toNumber(item.goal_mouth_y);
        var targetZ = toNumber(item.goal_mouth_z);

        if (targetY !== null && targetZ !== null) {
          message += ' | Porteria: y=' + targetY.toFixed(1) + ', z=' + targetZ.toFixed(1);
        } else {
          message += ' | Sin coordenadas de porteria';
        }

        detail.textContent = message;
      }

      function summarizeShots(shotItems) {
        var goalCount = 0;
        var counts = {};
        var parts = ['Tiros visibles: ' + shotItems.length];

        shotItems.forEach(function (item) {
          var team = item.team || 'Sin equipo';
          counts[team] = (counts[team] || 0) + 1;
          if (item.is_goal === true) {
            goalCount += 1;
          }
        });

        parts.push('Goles: ' + goalCount);

        Object.keys(teamColors).forEach(function (team) {
          if (counts[team]) {
            parts.push(team + ': ' + counts[team]);
          }
        });

        return parts.join(' | ');
      }

      function drawShots(shotItems) {
        var frame = drawShotPitchFrame(shotSvg);
        var layer = shotSvg.querySelector('[data-shot-layer]');

        if (!layer) {
          return;
        }

        if (!shotItems.length) {
          selectedShotKey = '';
          drawGoalFrame(goalSvg, null, null);
          summary.textContent = 'Tiros visibles: 0';
          updateDetail(null);
          return;
        }

        if (!findSelectedShot(shotItems)) {
          selectedShotKey = getShotKey(shotItems[0]);
        }

        shotItems.forEach(function (item) {
          var point = toShotPitchPoint(item, frame);
          if (!point) {
            return;
          }

          var shotKey = getShotKey(item);
          var color = getTeamColor(item.team, teamColors);
          var anchor = getShotGoalAnchor(item, frame);
          var isSelected = shotKey === selectedShotKey;
          var group = createSvgNode('g', {
            tabindex: 0,
            role: 'button',
            'aria-label': buildShotDescription(item)
          });
          group.style.cursor = 'pointer';

          if (isSelected) {
            group.appendChild(createSvgNode('circle', {
              cx: point.x,
              cy: point.y,
              r: 13,
              fill: color,
              opacity: 0.15
            }));
          }

          group.appendChild(createSvgNode('line', {
            x1: point.x,
            y1: point.y,
            x2: anchor.x,
            y2: anchor.y,
            stroke: color,
            'stroke-width': isSelected ? 3.4 : 2.4,
            'stroke-linecap': 'round',
            'stroke-dasharray': isSelected ? '10 6' : '8 6',
            opacity: isSelected ? 0.95 : 0.72
          }));

          group.appendChild(createSvgNode('circle', {
            cx: point.x,
            cy: point.y,
            r: isSelected ? 6.8 : 5.1,
            fill: color,
            stroke: 'rgba(255, 255, 255, 0.95)',
            'stroke-width': isSelected ? 2.2 : 1.5
          }));

          appendTitle(group, buildShotDescription(item));

          group.addEventListener('click', function () {
            selectedShotKey = shotKey;
            refreshDraw();
          });
          group.addEventListener('keydown', function (event) {
            if (event.key === 'Enter' || event.key === ' ') {
              event.preventDefault();
              selectedShotKey = shotKey;
              refreshDraw();
            }
          });

          layer.appendChild(group);
        });

        var selectedShot = findSelectedShot(shotItems) || shotItems[0];
        drawGoalFrame(goalSvg, selectedShot, getTeamColor(selectedShot.team, teamColors));
        summary.textContent = summarizeShots(shotItems);
        updateDetail(selectedShot);
      }

      function refreshDraw() {
        drawShots(filterShots());
      }

      function refresh() {
        rebuildPlayerOptions(playerSelect, events, teamSelect.value);
        refreshDraw();
      }

      teamSelect.addEventListener('change', refresh);
      playerSelect.addEventListener('change', refreshDraw);
      resultSelect.addEventListener('change', refreshDraw);

      refresh();
    }

    document.querySelectorAll('[data-pass-widget]').forEach(renderPassWidget);
    document.querySelectorAll('[data-shot-widget]').forEach(renderShotWidget);
  })();
</script>
